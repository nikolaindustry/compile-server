services:
  - type: web
    name: hyperwisor-compile-server
    env: docker
    dockerfilePath: ./Dockerfile
    plan: pro
    # Pro plan: 4GB RAM - required for ESP32 core 3.3.7
    # Libraries are installed on-demand during compilation
    envVars:
      - key: HYPERWISOR_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: PORT
        value: 3000
