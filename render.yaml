services:
  - type: web
    name: hyperwisor-compile-server
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    # Note: Persistent disk removed - no longer needed with async architecture
    # Libraries are installed on-demand during compilation
    envVars:
      - key: HYPERWISOR_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: PORT
        value: 3000
